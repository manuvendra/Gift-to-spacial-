<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff4e8a, #6a5cff);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    max-width: 400px;
}

h1 {
    font-size: 2.5rem;
}

p {
    font-size: 1.2rem;
    margin: 20px 0;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4e8a;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

.heart {
    position: absolute;
    color: white;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh) scale(0.5);}
    100% {transform: translateY(-10vh) scale(1.5);}
}
</style>
</head>

<body>

<div class="container">

    <!-- Step 1 -->
    <div id="step1">
        <h1>Hey Beautiful ❤️</h1>
        <p>I made something special just for you...</p>
        <button onclick="next(1)">Start</button>
    </div>

    <!-- Step 2 -->
    <div id="step2" class="hidden">
        <h1>🎉 Happy Birthday 🎂</h1>
        <p>You are the most amazing person in my life 💕</p>
        <button onclick="next(2)">Next</button>
    </div>

    <!-- Step 3 -->
    <div id="step3" class="hidden">
        <h1>Why I Like You 😍</h1>
        <p>Your smile 😊<br>Your heart 💖<br>Your everything ✨</p>
        <button onclick="next(3)">Next</button>
    </div>

    <!-- Step 4 -->
    <div id="step4" class="hidden">
        <h1>One Question...</h1>
        <p>You make my world perfect 💫</p>
        <button onclick="next(4)">Tell Me</button>
    </div>

    <!-- Step 5 FINAL -->
    <div id="step5" class="hidden">
        <h1>Will You Be Mine Forever? 💍</h1>
        <button onclick="yes()">YES ❤️</button>
        <button onclick="no()">NO 😢</button>
        <p id="result"></p>
    </div>

</div>

<script>
function next(step){
    document.getElementById("step"+step).classList.add("hidden");
    document.getElementById("step"+(step+1)).classList.remove("hidden");
}

function yes(){
    document.getElementById("result").innerHTML = "I Love You So Much ❤️😍";
    startHearts();
}

function no(){
    document.getElementById("result").innerHTML = "Please think again 😭❤️";
}

// Floating hearts animation
function startHearts(){
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (Math.random()*20 + 20) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}
</script>

</body>
</html>
